# Default parameters used for affinity and description matching, used as part of the swissgeol_doc_processing package.
# These parameters should be changed only if we want to impact the functionality of the package globally.

block_line_ratio: 0.20
min_block_clearance: 10
left_line_length_threshold: 7
duplicate_layer_threshold: 0.95
min_num_layers: 2
protocol_min_num_layers: 1
fallback_min_table_height_ratio: 0.85
affinity_params:
  a_above_b:
    importance: 5.0
    weights:
      line_weight: 3.5
      left_line_weight: 1.0
      spacing_weight: 1.25
      right_end_weight: 1.0
      diagonal_weight: 1.25
      gap_weight: 0.0
      indentation_weight: 0.6
  a_to_b:
    importance: 2.0
    weights:
      line_weight: 1.0
      left_line_weight: 1.0
      spacing_weight: 1.0
      right_end_weight: 1.0
      diagonal_weight: 0.0
      gap_weight: 0.0
      indentation_weight: 0.0
  layer_identifier:
    importance: 0.66
    weights:
      line_weight: 0.2
      left_line_weight: 0.2
      spacing_weight: 1.0
      right_end_weight: 0.6
      diagonal_weight: 0.0
      gap_weight: 0.0
      indentation_weight: 0.0
  spulprobe:
    importance: 2.0
    weights:
      line_weight: 1.0
      left_line_weight: 1.0
      spacing_weight: 1.0
      right_end_weight: 1.0
      diagonal_weight: 0.0
      gap_weight: 0.0
      indentation_weight: 0.0
  no_sidebar:
    weights:
      line_weight: 1.0
      left_line_weight: 1.0
      spacing_weight: 1.0
      right_end_weight: 1.0
      diagonal_weight: 1.0
      gap_weight: 0.2
      indentation_weight: 0.0
  protocol:
      importance: 1.0
      min_entries: 2
      header_keywords:
        - Tiefe
        - Tiefe bis
        - Tiefe bis m
        - bis
        - Depth
      max_header_gap: 40
      # those parameters were chosen randomly but they behave well so far.
      weights:
        line_weight: 1.0
        left_line_weight: 1.0
        spacing_weight: 1.0
        right_end_weight: 1.0
        diagonal_weight: 1.0
        gap_weight: 0.2
        indentation_weight: 0.0
empty_interval_penalty: 0.2

material_description_column_width: 0.08

depth_column_params: # these params should be optimized as soon as there is reliable evaluation data
  noise_count_threshold: 1.25
  noise_count_offset: 2.5

non_description_lines_ratio: 0.15

default_language: de

compound_split_threshold: 0.4

# Lines whose text contains any of these substrings (case-insensitive) are treated as column
# headers for the material description column. They are excluded from the material description
# output text and act as a hard upper boundary (nothing above them is included). They are also
# used as a positive selection signal when choosing between candidate columns.
material_description_column_headers:
  de:
    - beschreibung
    - beschrieb
    - bodenart
    - lithologie
    - materialbezeichnung
  fr:
    - description


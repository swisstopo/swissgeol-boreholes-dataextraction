name: Publish Edge

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      VERSION:
        description: 'Override version (e.g. 1.0.42-dev99). Defaults to <VERSION file>-dev<run_number>.'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  publish-edge:
    runs-on: ubuntu-latest
    name: Build and push Docker image and create a new GitHub pre-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set environment variables
        run: |
          if [ -n "${{ github.event.inputs.VERSION }}" ]; then
              echo VERSION=${{ github.event.inputs.VERSION }} >> $GITHUB_ENV
            else
              echo VERSION=$(cat VERSION)-dev$GITHUB_RUN_NUMBER >> $GITHUB_ENV
            fi
            echo BASE_IMAGE_NAME=$REGISTRY/$(echo ${GITHUB_REPOSITORY,,}) >> $GITHUB_ENV
            echo COMMITED_AT=$(git show -s --format=%cI `git rev-parse HEAD`) >> $GITHUB_ENV
      - name: Collect Docker image metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BASE_IMAGE_NAME }}-api
          labels: |
            org.opencontainers.image.created=${{ env.COMMITED_AT }}
            org.opencontainers.image.version=v${{ env.VERSION }}
            org.opencontainers.image.authors=Stijn Vermeeren <stijn.vermeeren@swisstopo.ch>
          flavor: |
            latest=false
          tags: |
            type=edge
            type=raw,value=v${{ env.VERSION }}

      - name: Log in to the GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner  }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image (api)
        uses: docker/build-push-action@v5
        with:
          context: ./
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BASE_IMAGE_NAME }}-api:edge
          cache-to: type=inline

      - name: Create GitHub pre-release
        run: gh release create "v${{ env.VERSION }}" --prerelease --title "${{ env.VERSION }}" --target "${{ github.ref_name }}"

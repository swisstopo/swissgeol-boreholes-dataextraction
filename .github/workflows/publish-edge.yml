name: Publish Edge

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. 1.2.3-dev4). Leave empty to determine automatically.'
        required: false
        default: ''

permissions: write-all

env:
  REGISTRY: ghcr.io
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  IS_EDGE: ${{ github.event_name == 'push' || github.event.inputs.version == '' }}

jobs:
  determine_version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.find_version.outputs.result || github.event.inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        if: ${{ github.event.inputs.version == '' }}

      - name: Get tags of edge commit
        id: get_edge_tags
        if: ${{ github.event.inputs.version == '' }}
        run: |
          git fetch --tags
          EDGE_COMMIT=$(git rev-list -n 1 edge 2>/dev/null || git rev-parse HEAD)
          EDGE_TAGS=$(printf "%s," $(git tag --contains $EDGE_COMMIT))
          EDGE_TAGS=${EDGE_TAGS%,}
          echo "edge_tags=$EDGE_TAGS" >> "$GITHUB_OUTPUT"

      - name: Find next version
        id: find_version
        if: ${{ github.event.inputs.version == '' }}
        uses: actions/github-script@v7
        env:
          EDGE_TAGS: ${{ steps.get_edge_tags.outputs.edge_tags }}
        with:
          result-encoding: string
          script: |
            const { findNextVersion } = require('./.github/scripts/find-version.js');
            const tags = process.env.EDGE_TAGS.split(',');
            const targetBranch = context.payload.ref.replace('refs/heads/', '');

            const pullRequests = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              base: targetBranch,
              sort: 'updated',
              direction: 'desc'
            });

            const mergedPullRequest = pullRequests.data.find(pr => pr.merge_commit_sha === context.payload.after);
            const sourceBranch = mergedPullRequest == null
              ? targetBranch
              : mergedPullRequest.head.ref.replace('refs/heads/', '');

            const version = findNextVersion(tags, sourceBranch);
            return `${version.major}.${version.minor}.${version.patch}-dev${version.preRelease}`;

  publish_edge:
    name: Build and push Docker image
    needs: determine_version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set environment variables
        run: |
          echo BASE_IMAGE_NAME=$REGISTRY/$(echo ${GITHUB_REPOSITORY,,}) >> $GITHUB_ENV
          echo COMMITTED_AT=$(git show -s --format=%cI $(git rev-parse HEAD)) >> $GITHUB_ENV
          echo VERSION=${{ needs.determine_version.outputs.version }} >> $GITHUB_ENV
          echo PEP440_VERSION=$(echo "${{ needs.determine_version.outputs.version }}" | sed 's/-dev/.dev/') >> $GITHUB_ENV

      - name: Collect Docker image metadata (api)
        id: meta-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.BASE_IMAGE_NAME }}-api
          labels: |
            org.opencontainers.image.created=${{ env.COMMITTED_AT }}
            org.opencontainers.image.version=v${{ env.VERSION }}
            org.opencontainers.image.authors=Stijn Vermeeren <stijn.vermeeren@swisstopo.ch>
          flavor: |
            latest=false
          tags: |
            type=edge,enable=${{ env.IS_EDGE }}
            type=raw,value=v${{ env.VERSION }}

      - name: Log in to the GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (api)
        uses: docker/build-push-action@v7
        with:
          context: ./
          push: true
          build-args: |
            VERSION=${{ env.PEP440_VERSION }}
            BERT_MODEL_S3_BUCKET=${{ secrets.BERT_MODEL_S3_BUCKET }}
          secrets: |
            aws_access_key_id=${{ secrets.BERT_MODEL_AWS_ACCESS_KEY_ID }}
            aws_secret_access_key=${{ secrets.BERT_MODEL_AWS_SECRET_ACCESS_KEY }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BASE_IMAGE_NAME }}-api:edge
          cache-to: type=inline

  tag_commit:
    name: Tag commit
    needs:
      - determine_version
      - publish_edge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Tag edge
        if: ${{ env.IS_EDGE == 'true' }}
        uses: ./.github/actions/tag-commit
        with:
          TAG_NAME: edge
          SHA: ${{ github.sha }}

      - name: Tag version
        uses: ./.github/actions/tag-commit
        with:
          TAG_NAME: ${{ needs.determine_version.outputs.version }}
          SHA: ${{ github.sha }}


name: Publish Python Package edge

on:
  workflow_dispatch:
    inputs:
      base:
        type: string
        description: |
          The tag of the image to build the package from (defaults to "edge").
          Use a specific dev tag (e.g. v1.0.dev42) to build from an older build.
        required: false
        default: "edge"

env:
  REGISTRY: ghcr.io
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BASE: ${{ github.event.inputs.base || 'edge' }}

jobs:
  publish-edge-package:
    runs-on: ubuntu-latest
    name: Build and publish Python edge package

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set environment variables
        run: |
          echo IMAGE=$REGISTRY/$(echo ${GITHUB_REPOSITORY,,})-api >> $GITHUB_ENV

      - name: Log in to the GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull edge image
        run: docker pull ${{ env.IMAGE }}:${{ env.BASE }}

      - name: Extract version from image labels
        id: version
        run: |
          VERSION=$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' ${{ env.IMAGE }}:${{ env.BASE }} | sed 's/^v//')
          if [ -z "$VERSION" ]; then echo "ERROR: Could not extract version from image labels" && exit 1; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          export SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.version.outputs.version }}
          uv build

      - name: List built packages
        run: ls -lh dist/

      - name: Create GitHub pre-release
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            --prerelease \
            --draft=false \
            --title "${{ steps.version.outputs.version }}" \
            --notes "Edge package build from image tag \`${{ env.BASE }}\`." \
            2>/dev/null || true

      - name: Upload to GitHub Release
        run: |
          gh release upload v${{ steps.version.outputs.version }} dist/*.whl dist/*.tar.gz --clobber

      - name: Generate step summary
        uses: ./.github/actions/python-package-summary
        with:
          version: ${{ steps.version.outputs.version }}

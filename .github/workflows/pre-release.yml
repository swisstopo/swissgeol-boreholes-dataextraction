name: Pre-release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base:
        type: string
        description: |
          The tag of the image to retag as release-candidate (defaults to "edge").
          NOTE: This workflow assumes 'develop' has been merged into 'main' before
          running, so that the 'edge' image reflects the current state of main.
          Use a specific version tag (e.g. v1.0.42-dev99) to override if needed.
        required: false
        default: "edge"

env:
  REGISTRY: ghcr.io
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BASE: ${{ github.event.inputs.base || 'edge' }}

jobs:
  tag-release-candidate:
    runs-on: ubuntu-latest
    name: Retag edge image as release-candidate

    steps:
      - name: Set environment variables
        run: |
          echo IMAGE=$REGISTRY/$(echo ${GITHUB_REPOSITORY,,})-api >> $GITHUB_ENV

      - name: Log in to the GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull ${{ env.IMAGE }}:${{ env.BASE }}

      - name: Tag as release-candidate
        run: docker tag ${{ env.IMAGE }}:${{ env.BASE }} ${{ env.IMAGE }}:release-candidate

      - name: Push release-candidate
        run: docker push ${{ env.IMAGE }}:release-candidate

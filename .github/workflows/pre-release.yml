name: Pre-release

permissions: write-all

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base:
        type: string
        description: |
          The tag of the image to retag as release-candidate (defaults to "edge").
          NOTE: This workflow assumes 'develop' has been merged into 'main' before
          running, so that the 'edge' image reflects the current state of main.
          Use a specific version tag (e.g. v1.0.42-dev99) to override if needed.
        required: false
        default: "edge"

env:
  REGISTRY: ghcr.io
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BASE: ${{ github.event.inputs.base || 'edge' }}

jobs:
  tag-release-candidate:
    runs-on: ubuntu-latest
    name: Retag edge image as release-candidate
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Set environment variables
        run: |
          echo IMAGE=$REGISTRY/$(echo ${GITHUB_REPOSITORY,,})-api >> $GITHUB_ENV

      - name: Log in to the GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, retag and push release-candidate
        run: |
          docker pull ${{ env.IMAGE }}:${{ env.BASE }}
          docker tag ${{ env.IMAGE }}:${{ env.BASE }} ${{ env.IMAGE }}:release-candidate
          docker push ${{ env.IMAGE }}:release-candidate

      - name: Extract and save version from image labels
        id: version
        run: |
          VERSION=$(docker inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' ${{ env.IMAGE }}:${{ env.BASE }} | sed 's/^v//' | sed 's/-dev[0-9]*//')
          if [ -z "$VERSION" ]; then echo "ERROR: Could not extract version from image labels" && exit 1; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  tag_rc_commit:
    name: Tag release-candidate commit
    needs: tag-release-candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get base commit
        id: get_base_commit
        run: |
          git fetch --tags
          BASE_COMMIT=$(git rev-list -n 1 ${{ env.BASE }})
          echo "sha=$BASE_COMMIT" >> "$GITHUB_OUTPUT"

      - name: Tag release-candidate
        uses: ./.github/actions/tag-commit
        with:
          TAG_NAME: release-candidate
          SHA: ${{ steps.get_base_commit.outputs.sha }}

      - name: Tag clean version
        uses: ./.github/actions/tag-commit
        with:
          TAG_NAME: ${{ needs.tag-release-candidate.outputs.version }}
          SHA: ${{ steps.get_base_commit.outputs.sha }}

  publish-package:
    runs-on: ubuntu-latest
    name: Build and publish Python package pre-release
    needs: tag-release-candidate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          export SETUPTOOLS_SCM_PRETEND_VERSION=${{ needs.tag-release-candidate.outputs.version }}
          uv build

      - name: List built packages
        run: ls -lh dist/

      - name: Create GitHub pre-release
        run: |
          gh release create v${{ needs.tag-release-candidate.outputs.version }} \
            --prerelease \
            --draft=false \
            --target main \
            --title "${{ needs.tag-release-candidate.outputs.version }}" \
            --notes "Pre-release from main branch." \
            2>/dev/null || true

      - name: Upload to GitHub Release
        run: |
          gh release upload v${{ needs.tag-release-candidate.outputs.version }} dist/*.whl dist/*.tar.gz --clobber

      - name: Generate step summary
        uses: ./.github/actions/python-package-summary
        with:
          version: ${{ needs.tag-release-candidate.outputs.version }}

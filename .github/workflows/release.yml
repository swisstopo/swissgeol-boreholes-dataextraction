name: Release

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      TAG_NAME:
        description: |
          Tag name. IMPORTANT: Must match the version embedded in
          the release-candidate image. Check the pre-release tag for the correct value.
        required: true

env:
  REGISTRY: ghcr.io
  TAG_NAME: ${{ github.event.inputs.TAG_NAME || github.event.release.tag_name }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  retag-docker-image:
    runs-on: ubuntu-latest
    name: Push updated Docker image

    steps:
      - name: Set environment variables
        run: |
          echo VERSION=${TAG_NAME#v} >> $GITHUB_ENV
          echo BASE_IMAGE_NAME=$REGISTRY/$(echo ${GITHUB_REPOSITORY,,}) >> $GITHUB_ENV

      - name: Log in to the GitHub container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull release-candidate
        run: docker pull ${{ env.BASE_IMAGE_NAME }}-api:release-candidate

      - name: Collect Docker image metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BASE_IMAGE_NAME }}-api
          flavor: |
            latest=false
          tags: |
            type=semver,pattern=v{{version}},value=${{ env.TAG_NAME }}
            type=semver,pattern=v{{major}}.{{minor}},value=${{ env.TAG_NAME }}
            type=semver,pattern=v{{major}},value=${{ env.TAG_NAME }}
            type=raw,value=latest

      - name: Tag and push stable tags
        run: |
          for TAG in $(echo "${{ steps.meta-api.outputs.tags }}" | tr '\n' ' '); do
            docker tag ${{ env.BASE_IMAGE_NAME }}-api:release-candidate $TAG
            docker push $TAG
          done

  publish-package:
    runs-on: ubuntu-latest
    name: Build and publish Python package
    needs: retag-docker-image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          echo VERSION=${TAG_NAME#v} >> $GITHUB_ENV

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          export SETUPTOOLS_SCM_PRETEND_VERSION=${{ env.VERSION }}
          uv build

      - name: List built packages
        run: ls -lh dist/

      - name: Upload to GitHub Release
        run: |
          gh release upload ${{ env.TAG_NAME }} dist/*.whl dist/*.tar.gz --clobber

      - name: Generate step summary
        uses: ./.github/actions/python-package-summary
        with:
          version: ${{ steps.version.outputs.version }}

  patch-changelog:
    runs-on: ubuntu-latest
    name: Patch CHANGELOG.md and update GitHub release notes
    needs: [retag-docker-image, publish-package]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          echo GIT_BRANCH_NAME=mark-version-${TAG_NAME#v}-as-released >> $GITHUB_ENV
          echo GIT_COMMIT_MESSAGE=Mark version ${TAG_NAME#v} as released >> $GITHUB_ENV
          echo RELEASE_ID=$(gh api -H "Accept: application/vnd.github+json" /repos/${GITHUB_REPOSITORY}/releases/tags/${TAG_NAME} | jq '.id') >> $GITHUB_ENV

      - name: Get changelog for this specific release and update release notes
        run: |
          gh api \
            --method PATCH \
            --header "Accept: application/vnd.github+json" \
            /repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID} \
            -f body="$(./get-changelog.sh)"

      - name: Checkout new branch and patch changelog
        run: |
          git checkout -b $GIT_BRANCH_NAME
          sed -i "/^\#\# \[Unreleased\]$/a \\\n\#\# $TAG_NAME - $(date '+%Y-%m-%d')" CHANGELOG.md

      - name: Commit, push and create pull request
        run: |
          git config --global user.email "stijn.vermeeren@swisstopo.ch"
          git config --global user.name "Github build action"
          git commit -am "$GIT_COMMIT_MESSAGE"
          git push --set-upstream origin $GIT_BRANCH_NAME
          gh pr create --title "$GIT_COMMIT_MESSAGE" --body ""